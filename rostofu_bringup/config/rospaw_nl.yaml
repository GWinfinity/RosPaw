# RosPaw NL (Natural Language) Configuration
# 自然语言控制配置文件

nl_commander:
  ros__parameters:
    # LLM 提供商选择: ollama, openai, dashscope, zhipu
    llm_provider: "ollama"
    
    # Ollama 配置 (本地 LLM)
    ollama_host: "http://localhost:11434"
    ollama_model: "qwen2.5:7b"  # 或其他模型: llama3.1, gemma2 等
    
    # OpenAI 配置
    openai_api_key: ""  # 设置你的 API Key
    openai_base_url: "https://api.openai.com/v1"
    openai_model: "gpt-3.5-turbo"
    
    # 阿里云 DashScope 配置 (推荐国内用户使用)
    dashscope_api_key: ""  # 设置你的 DashScope API Key
    dashscope_model: "qwen-turbo"  # 或 qwen-max, qwen-plus
    
    # 智谱 AI 配置
    zhipu_api_key: ""
    zhipu_model: "glm-4"
    
    # 执行配置
    auto_execute: true  # 自动执行解析的命令
    require_confirmation: false  # 低置信度命令是否需要确认
    
    # 语音合成配置
    tts_enabled: false
    tts_provider: "edge"  # edge, azure

voice_input:
  ros__parameters:
    enabled: false
    stt_provider: "whisper"  # whisper, dashscope
    whisper_model: "base"  # tiny, base, small, medium, large
    language: "zh"  # 识别语言
    
    # 唤醒词配置
    wake_word_enabled: true
    wake_word: "你好机器人"
    
    # 音频配置
    sample_rate: 16000
    record_seconds: 5
    
    # 阿里云语音识别 (可选)
    dashscope_api_key: ""
