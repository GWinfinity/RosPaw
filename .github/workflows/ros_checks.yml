name: ROS Package Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy]
        include:
          - ros_distro: humble
            ros_image: ros:humble-ros-base
          - ros_distro: jazzy
            ros_image: ros:jazzy-ros-base
    container:
      image: ${{ matrix.ros_image }}
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup ROS
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        rosdep update
    
    - name: Check package.xml
      run: |
        cd rostofu_bringup
        # Check if package.xml exists
        test -f package.xml || exit 1
        # Check version format
        grep -E '<version>[0-9]+\.[0-9]+\.[0-9]+</version>' package.xml || exit 1
        # Check license
        grep -E '<license>.*</license>' package.xml || exit 1
        # Check maintainer
        grep -E '<maintainer.*>.*</maintainer>' package.xml || exit 1
        echo "✓ package.xml checks passed"
    
    - name: Check setup.py
      run: |
        cd rostofu_bringup
        test -f setup.py || exit 1
        echo "✓ setup.py exists"
    
    - name: Check LICENSE
      run: |
        test -f LICENSE || exit 1
        echo "✓ LICENSE file exists"
    
    - name: Install dependencies
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd rostofu_bringup
        rosdep install --from-paths . --ignore-src -y || true
    
    - name: Build package
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        mkdir -p ~/ros2_ws/src
        cp -r rostofu_bringup ~/ros2_ws/src/
        cd ~/ros2_ws
        colcon build --packages-select rostofu_bringup
    
    - name: Run tests
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ~/ros2_ws
        colcon test --packages-select rostofu_bringup
        colcon test-result --verbose
